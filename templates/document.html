<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>[Document Title] — Red Door Collaborative</title>
<!-- FOUC prevention: set data-theme before stylesheets paint -->
<script>(function(){try{var p=JSON.parse(localStorage.getItem('rdc-prefs')||'{}');document.documentElement.setAttribute('data-theme',p.theme||(window.matchMedia('(prefers-color-scheme: dark)').matches?'dark':'light'));}catch(e){}})();<\/script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,300&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../css/rdc.css">
<style>
/* Sidebar page subtitle — outside the logo anchor so it doesn't affect lockup alignment */
.sidebar-logo-sub{display:block;font-size:9px;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;color:rgba(255,255,255,0.3);margin:-1rem 0 1.5rem;padding-left:46px;}
/* Use var(--gray-900) for prose text — flips properly in dark mode. NEVER var(--squid). */
.page-header-meta{font-size:13px;color:rgba(255,255,255,0.55);line-height:1.7;max-width:560px;margin-top:0.75rem;}
.page-header-meta strong{color:rgba(255,255,255,0.85);font-weight:600;}
.content h2{margin:56px 0 14px;scroll-margin-top:1rem;font-size:26px;}
.content h2:first-child{margin-top:0;}
.content h3{margin:32px 0 10px;scroll-margin-top:1rem;font-size:18px;}
.content h4{margin:22px 0 6px;}
.content p{margin:10px 0 14px;}
.content ul,.content ol{margin:10px 0 16px;}
.content li{margin:5px 0;font-size:15px;}
.content li>ul,.content li>ol{margin:6px 0;}
.content strong{color:var(--gray-900);}
.content pre code{background:transparent;padding:0;font-size:inherit;color:inherit;}
.content input[type="checkbox"]{margin-right:6px;}
.content table{border-collapse:collapse;width:100%;margin:16px 0;font-size:13px;background:var(--white);border:1px solid var(--gray-200);border-radius:var(--radius-md);overflow:hidden;}
.content table thead th{background:var(--gray-100);font-size:10px;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;color:var(--gray-500);text-align:left;padding:12px 14px;border-bottom:1px solid var(--gray-200);}
.content table tbody td{padding:10px 14px;border-bottom:1px solid var(--gray-200);color:var(--gray-900);vertical-align:top;}
.content table tbody tr:last-child td{border-bottom:none;}
</style>
</head>
<body>

<!-- LAYOUT TOGGLE — include on every page; gives users control of align/size/theme -->
<div class="layout-toggle">
  <div class="layout-toggle-group">
    <span class="layout-toggle-label">Align</span>
    <button class="layout-toggle-btn" data-group="align" data-value="center">Center</button>
    <button class="layout-toggle-btn" data-group="align" data-value="left">Left</button>
  </div>
  <div class="layout-toggle-sep"></div>
  <div class="layout-toggle-group">
    <span class="layout-toggle-label">Size</span>
    <button class="layout-toggle-btn" data-group="size" data-value="default">Default</button>
    <button class="layout-toggle-btn" data-group="size" data-value="large">Large</button>
    <button class="layout-toggle-btn" data-group="size" data-value="editorial">Editorial</button>
  </div>
  <div class="layout-toggle-sep"></div>
  <div class="layout-toggle-group">
    <span class="layout-toggle-label">Theme</span>
    <button class="layout-toggle-btn" data-group="theme" data-value="light">Light</button>
    <button class="layout-toggle-btn" data-group="theme" data-value="dark">Dark</button>
  </div>
</div>

<!-- ============================================================
     SIDEBAR
     - Logo links back to hub (../index.html) — do not use href="#"
     - Subtitle goes in .sidebar-logo-sub AFTER the </a>, NOT inside
       .logo-text. Putting it inside inflates the flex-row height and
       offsets the logo-mark via align-items:center. The subtitle should
       name the current page (e.g. "Implementation Plan", "Baseline Index").
     - sidebar-version shows date or status; use &middot; for separators
============================================================ -->
<aside class="sidebar">
  <a class="sidebar-logo" href="../index.html">
    <div class="logo-mark">rd</div>
    <div class="logo-text">Red Door<br>Collaborative</div>
  </a>
  <div class="sidebar-logo-sub">[Page Name]</div>
  <div class="nav-section-label">Sections</div>
  <a class="nav-link active" href="#section-1" onclick="setActive(this)">[Section 1]</a>
  <a class="nav-link" href="#section-2" onclick="setActive(this)">[Section 2]</a>
  <a class="nav-link" href="#section-3" onclick="setActive(this)">[Section 3]</a>
  <!-- Add more nav-links as needed -->
  <div class="sidebar-version">Updated: [Month DD, YYYY]</div>
</aside>

<!-- ============================================================
     MAIN CONTENT
     Use .sidebar-content + .sidebar-inner — NOT .main or .inner
============================================================ -->
<main class="sidebar-content">
<div class="sidebar-inner">

  <!-- ============================================================
       PAGE HEADER
       eyebrow = category / doc type
       page-header-title = document name
       page-header-meta = owner, status, version, date, etc.
  ============================================================ -->
  <div class="page-header">
    <div class="eyebrow">[Category &middot; Doc type]</div>
    <div class="page-header-title">[Document Title]</div>
    <div class="page-header-meta">
      <strong>Owner:</strong> [Name] &middot;
      <strong>Status:</strong> [Draft / Under Review / Approved] &middot;
      <strong>Version:</strong> [v1.0]
    </div>
  </div>

  <!-- ============================================================
       DOCUMENT CONTENT
       All section <h2> elements need matching id= for scroll-spy.
       Nav links href must match: href="#section-id"
  ============================================================ -->
  <div class="content">

    <h2 id="section-1">[Section 1 Heading]</h2>
    <p>[Section 1 content. Replace with actual document content.]</p>

    <h2 id="section-2">[Section 2 Heading]</h2>
    <p>[Section 2 content.]</p>

    <h2 id="section-3">[Section 3 Heading]</h2>
    <p>[Section 3 content.]</p>

  </div>

</div>
</main>

<!-- ============================================================
     SCRIPTS
     IMPORTANT: setActive() must be at script scope (not inside an
     IIFE) so onclick="setActive(this)" on nav links can reach it.
     IntersectionObserver handles auto-highlighting on scroll.
     Layout toggle reads/writes localStorage 'rdc-prefs' for
     cross-page persistence of theme/align/size preferences.
============================================================ -->
<script>
function setActive(el){
  document.querySelectorAll('.nav-link').forEach(function(l){l.classList.remove('active');});
  el.classList.add('active');
}
(function(){
  var headings=document.querySelectorAll('.content h2');
  var navLinks=document.querySelectorAll('.nav-link');
  var obs=new IntersectionObserver(function(entries){
    entries.forEach(function(entry){
      if(entry.isIntersecting){
        var id=entry.target.getAttribute('id');
        navLinks.forEach(function(l){l.classList.toggle('active',l.getAttribute('href')==='#'+id);});
      }
    });
  },{rootMargin:'-15% 0px -75% 0px'});
  headings.forEach(function(h){obs.observe(h);});
})();
(function(){
  var prefs={};try{prefs=JSON.parse(localStorage.getItem('rdc-prefs')||'{}');}catch(e){}
  if(prefs.size&&prefs.size!=='default') document.body.classList.add('size-'+prefs.size);
  if(prefs.align&&prefs.align!=='center') document.body.classList.add('layout-'+prefs.align);
  function cur(g){
    if(g==='theme') return document.documentElement.getAttribute('data-theme')||'light';
    if(g==='size')  return (Array.from(document.body.classList).find(function(c){return c.startsWith('size-');})||'size-default').replace('size-','');
    return (Array.from(document.body.classList).find(function(c){return c.startsWith('layout-');})||'layout-center').replace('layout-','');
  }
  document.querySelectorAll('.layout-toggle-btn').forEach(function(b){
    b.classList.toggle('active', b.dataset.value===cur(b.dataset.group));
  });
  document.querySelectorAll('.layout-toggle-btn').forEach(function(btn){
    btn.addEventListener('click',function(){
      var g=this.dataset.group,v=this.dataset.value;
      document.querySelectorAll('.layout-toggle-btn[data-group="'+g+'"]').forEach(function(b){b.classList.remove('active');});
      this.classList.add('active');
      if(g==='theme'){ document.documentElement.setAttribute('data-theme',v); }
      else if(g==='align'){ document.body.classList.remove('layout-center','layout-left'); if(v!=='center') document.body.classList.add('layout-'+v); }
      else { document.body.classList.remove('size-default','size-large','size-editorial'); if(v!=='default') document.body.classList.add('size-'+v); }
      try{var p=JSON.parse(localStorage.getItem('rdc-prefs')||'{}');p[g]=v;localStorage.setItem('rdc-prefs',JSON.stringify(p));}catch(e){}
    });
  });
})();
<\/script>
</body>
</html>
