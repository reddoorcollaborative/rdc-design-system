<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>[Hub Title] — Red Door Collaborative</title>
<!-- FOUC prevention: read localStorage before stylesheets paint -->
<script>(function(){try{var p=JSON.parse(localStorage.getItem('rdc-prefs')||'{}');document.documentElement.setAttribute('data-theme',p.theme||(window.matchMedia('(prefers-color-scheme: dark)').matches?'dark':'light'));}catch(e){}})();<\/script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,300&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../css/rdc.css">
</head>
<body>

<!-- Layout toggle — include on every page; do not remove -->
<div class="layout-toggle">
  <div class="layout-toggle-group">
    <span class="layout-toggle-label">Align</span>
    <button class="layout-toggle-btn" data-group="align" data-value="center">Center</button>
    <button class="layout-toggle-btn" data-group="align" data-value="left">Left</button>
  </div>
  <div class="layout-toggle-sep"></div>
  <div class="layout-toggle-group">
    <span class="layout-toggle-label">Size</span>
    <button class="layout-toggle-btn" data-group="size" data-value="default">Default</button>
    <button class="layout-toggle-btn" data-group="size" data-value="large">Large</button>
    <button class="layout-toggle-btn" data-group="size" data-value="editorial">Editorial</button>
  </div>
  <div class="layout-toggle-sep"></div>
  <div class="layout-toggle-group">
    <span class="layout-toggle-label">Theme</span>
    <button class="layout-toggle-btn" data-group="theme" data-value="light">Light</button>
    <button class="layout-toggle-btn" data-group="theme" data-value="dark">Dark</button>
  </div>
</div>

<div class="wrap" style="max-width:980px;">

  <!-- ============================================================
       PAGE HEADER
       Replace [Hub Title] and description. Remove the ::before
       watermark by overriding .page-header::before { content: '' }
       if a custom watermark word is preferred.
  ============================================================ -->
  <div class="page-header">
    <div class="eyebrow">Red Door Collaborative</div>
    <h1 class="page-header-title">[Hub Title]</h1>
    <p class="page-header-desc">[Brief description of this hub — what documents live here and who it's for.]</p>
  </div>

  <!-- ============================================================
       SECTION: Active project / primary content
  ============================================================ -->
  <div class="eyebrow" style="margin-bottom:4px;">[Section label]</div>
  <h2 style="font-size:20px;font-weight:600;color:var(--gray-900);margin:0 0 10px;padding-bottom:6px;border-bottom:1px solid var(--gray-200);">[Section heading]</h2>
  <p style="font-size:14px;color:var(--gray-700);margin:0 0 18px;">[One-sentence description of what this section contains.]</p>

  <div class="grid-auto" style="margin-bottom:40px;">

    <!-- Doc card: primary / password-protected -->
    <a href="#" class="doc-card">
      <div class="doc-card-bar" style="background:var(--squid);"></div>
      <div class="doc-card-body">
        <div class="eyebrow">[Category · Status]</div>
        <h3>[Document Title]</h3>
        <p>[One to two sentences describing what this document contains and why it matters.]</p>
        <div class="doc-card-lock">Password-protected</div>
      </div>
    </a>

    <!-- Doc card: coral bar -->
    <a href="#" class="doc-card">
      <div class="doc-card-bar"></div>
      <div class="doc-card-body">
        <div class="eyebrow">[Category]</div>
        <h3>[Document Title]</h3>
        <p>[One to two sentences describing what this document contains.]</p>
        <div class="doc-card-lock">Password-protected</div>
      </div>
    </a>

    <!-- Doc card: wine bar, open access -->
    <a href="#" class="doc-card">
      <div class="doc-card-bar" style="background:var(--wine);"></div>
      <div class="doc-card-body">
        <div class="eyebrow">[Category]</div>
        <h3>[Document Title]</h3>
        <p>[One to two sentences describing what this document contains.]</p>
        <div class="doc-card-lock doc-card-open" style="color:var(--gray-500);">Open access</div>
      </div>
    </a>

  </div>

  <!-- ============================================================
       SECTION: Reference / secondary content
  ============================================================ -->
  <h2 style="font-size:20px;font-weight:600;color:var(--gray-900);margin:0 0 18px;padding-bottom:6px;border-bottom:1px solid var(--gray-200);">Reference</h2>

  <div class="grid-auto" style="margin-bottom:40px;">

    <a href="#" class="doc-card">
      <div class="doc-card-bar" style="background:var(--squid);"></div>
      <div class="doc-card-body">
        <div class="eyebrow">[Reference type]</div>
        <h3>[Reference Title]</h3>
        <p>[What can someone look up here?]</p>
        <div class="doc-card-lock doc-card-open" style="color:var(--gray-500);">Open access</div>
      </div>
    </a>

  </div>

  <!-- ============================================================
       ALERT: Access or info notice (remove if not needed)
  ============================================================ -->
  <div class="alert-banner" style="margin-bottom:var(--space-8);">
    <strong>Access:</strong> [Any access instructions, passwords, or contact info for locked documents.]
  </div>

  <!-- ============================================================
       FOOTER
  ============================================================ -->
  <div class="page-footer">
    Red Door Collaborative &middot; [Hub Name] &middot; <a href="https://github.com/reddoorcollaborative">GitHub</a>
  </div>

</div>

<script>
/* Layout toggle — reads/writes localStorage 'rdc-prefs' for cross-page persistence */
(function(){
  var prefs={};try{prefs=JSON.parse(localStorage.getItem('rdc-prefs')||'{}');}catch(e){}
  if(prefs.size&&prefs.size!=='default') document.body.classList.add('size-'+prefs.size);
  if(prefs.align&&prefs.align!=='center') document.body.classList.add('layout-'+prefs.align);
  function cur(g){
    if(g==='theme') return document.documentElement.getAttribute('data-theme')||'light';
    if(g==='size')  return (Array.from(document.body.classList).find(function(c){return c.startsWith('size-');})||'size-default').replace('size-','');
    return (Array.from(document.body.classList).find(function(c){return c.startsWith('layout-');})||'layout-center').replace('layout-','');
  }
  document.querySelectorAll('.layout-toggle-btn').forEach(function(b){
    b.classList.toggle('active', b.dataset.value===cur(b.dataset.group));
  });
  document.querySelectorAll('.layout-toggle-btn').forEach(function(btn){
    btn.addEventListener('click',function(){
      var g=this.dataset.group,v=this.dataset.value;
      document.querySelectorAll('.layout-toggle-btn[data-group="'+g+'"]').forEach(function(b){b.classList.remove('active');});
      this.classList.add('active');
      if(g==='theme'){ document.documentElement.setAttribute('data-theme',v); }
      else if(g==='align'){ document.body.classList.remove('layout-center','layout-left'); if(v!=='center') document.body.classList.add('layout-'+v); }
      else { document.body.classList.remove('size-default','size-large','size-editorial'); if(v!=='default') document.body.classList.add('size-'+v); }
      try{var p=JSON.parse(localStorage.getItem('rdc-prefs')||'{}');p[g]=v;localStorage.setItem('rdc-prefs',JSON.stringify(p));}catch(e){}
    });
  });
})();
<\/script>
</body>
</html>
